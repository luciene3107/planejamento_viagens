openapi: 3.0.3
info:
  title: Planejamento Viagens API
  version: 1.0.0
  description: Estrutura inicial da API REST com JWT e MongoDB.
servers:
  - url: http://localhost:3000
tags:
  - name: Health
  - name: Auth
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Health check público
      responses:
        "200":
          description: API operacional
  /api/protected/health:
    get:
      tags: [Health]
      summary: Health check protegido com JWT
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Token válido
        "401":
          description: Token inválido ou ausente
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Registrar novo usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Usuário criado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: Email já utilizado
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Autenticar usuário e retornar JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Credenciais inválidas
        "403":
          description: Usuário inativo
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          example: Luciene
        email:
          type: string
          format: email
          example: luciene@email.com
        password:
          type: string
          format: password
          example: "123456"
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: luciene@email.com
        password:
          type: string
          format: password
          example: "123456"
    AuthResponse:
      type: object
      properties:
        token:
          type: string
          example: eyJhbGciOi...
        expiresIn:
          type: string
          example: 1d
        user:
          type: object
          properties:
            id:
              type: string
              example: "6814f42db637f17f43549a76"
            name:
              type: string
              example: Luciene
            email:
              type: string
              format: email
              example: luciene@email.com
